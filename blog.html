<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدونة MECO — آخر الأخبار والمقالات</title>
    <meta name="description" content="آخر أخبار ومقالات مشروع MECO. تابع أحدث التحديثات والإعلانات الرسمية.">
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/MonyCoin/meco_wallet/refs/heads/main/assets/icon.png">
    <style>
        :root {
            --primary: #6C63FF;
            --primary-light: #8B85FF;
            --bg: #0A0A0F;
            --surface: #1A1A2E;
            --surface-light: #222240;
            --text: #FFFFFF;
            --text-secondary: #A0A0B0;
            --gold: #FFD700;
            --success: #10B981;
            --border: #2A2A3E;
            --radius: 16px;
            --max-width: 900px;
            --font-ar: 'Tajawal', sans-serif;
        }

        [data-theme="light"] {
            --bg: #F8FAFD;
            --surface: #FFFFFF;
            --surface-light: #F0F2F5;
            --text: #1A1A2E;
            --text-secondary: #6B7280;
            --border: #E5E7EB;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-ar);
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.8;
            transition: background-color 0.3s, color 0.3s;
        }

        .container { max-width: var(--max-width); margin: 0 auto; padding: 0 20px; }

        header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(10,10,15,0.85); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 16px 0;
        }
        header .container { display: flex; align-items: center; justify-content: space-between; }
        .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .logo img { width: 42px; height: 42px; border-radius: 12px; }
        .logo span { font-size: 1.4rem; font-weight: 800; color: var(--text); }
        .logo span b { color: var(--primary); }
        nav { display: flex; align-items: center; gap: 24px; }
        nav a { color: var(--text-secondary); text-decoration: none; font-weight: 500; font-size: 0.95rem; transition: color 0.2s; }
        nav a:hover, nav a.active { color: var(--primary); }
        .header-actions { display: flex; align-items: center; gap: 12px; }
        .btn { padding: 10px 20px; border-radius: 30px; font-weight: 600; font-size: 0.9rem; cursor: pointer; border: none; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s; font-family: var(--font-ar); }
        .btn-primary { background: var(--primary); color: #FFF; }
        .btn-primary:hover { background: var(--primary-light); transform: translateY(-2px); }
        .theme-toggle { background: none; border: none; color: var(--text-secondary); font-size: 1.4rem; cursor: pointer; padding: 8px; }

        .page-hero { padding: 80px 0 40px; text-align: center; }
        .page-hero h1 { font-size: 2.5rem; font-weight: 900; margin-bottom: 12px; }
        .page-hero h1 span { color: var(--primary); }
        .page-hero p { color: var(--text-secondary); font-size: 1.1rem; }

        .blog-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; margin-bottom: 20px; transition: transform 0.2s, box-shadow 0.2s; }
        .blog-card:hover { transform: translateY(-4px); box-shadow: 0 12px 30px rgba(108,99,255,0.1); }
        .blog-date { color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 8px; }
        .blog-card h2 { font-size: 1.3rem; margin-bottom: 10px; }
        .blog-card h2 a { color: var(--text); text-decoration: none; }
        .blog-card h2 a:hover { color: var(--primary); }
        .blog-card p { color: var(--text-secondary); font-size: 0.95rem; margin-bottom: 16px; }
        .blog-tag { display: inline-block; background: var(--primary); color: #FFF; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; margin-left: 8px; }

        .pagination { display: flex; justify-content: center; gap: 12px; margin-top: 32px; display: none; } /* سنخفيها مؤقتاً */

        footer { border-top: 1px solid var(--border); padding: 40px 0; text-align: center; margin-top: 60px; }
        footer .social-links { display: flex; gap: 16px; justify-content: center; margin-bottom: 20px; }
        footer .social-links a { color: var(--text-secondary); font-size: 1.5rem; transition: color 0.2s; text-decoration: none; }
        footer .social-links a:hover { color: var(--primary); }
        footer p { color: var(--text-secondary); font-size: 0.9rem; }

        #blog-posts-container { min-height: 200px; }
        .loading { text-align: center; padding: 40px; color: var(--text-secondary); }

        .mobile-menu-btn { display: none; background: none; border: none; color: var(--text); font-size: 1.6rem; cursor: pointer; }
        @media (max-width: 768px) {
            .page-hero h1 { font-size: 2rem; }
            nav { display: none; position: absolute; top: 70px; left: 0; right: 0; background: var(--surface); flex-direction: column; padding: 20px; border-bottom: 1px solid var(--border); }
            nav.open { display: flex; }
            .mobile-menu-btn { display: block; }
        }
    </style>
</head>
<body>

    <header>
        <div class="container">
            <a href="index.html" class="logo">
                <img src="https://raw.githubusercontent.com/MonyCoin/meco_wallet/refs/heads/main/assets/icon.png" alt="MECO Logo">
                <span>MECO<b>Wallet</b></span>
            </a>
            <button class="mobile-menu-btn" onclick="document.querySelector('nav').classList.toggle('open')">☰</button>
            <nav>
                <a href="index.html">الرئيسية</a>
                <a href="about.html">عن المشروع</a>
                <a href="token.html">العملة</a>
                <a href="wallet.html">المحفظة</a>
                <a href="roadmap.html">خارطة الطريق</a>
                <a href="blog.html" class="active">المدونة</a>
                <a href="contact.html">اتصل بنا</a>
            </nav>
            <div class="header-actions">
                <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
                <a href="https://monycoin.github.io/meco_wallet-app/" class="btn btn-primary">⬇️ تحميل</a>
            </div>
        </div>
    </header>

    <!-- Hero -->
    <section class="page-hero">
        <div class="container">
            <h1>📰 <span>المدونة</span></h1>
            <p>آخر الأخبار والتحديثات الرسمية لمشروع MECO</p>
        </div>
    </section>

    <!-- Blog Posts (Dynamic) -->
    <section>
        <div class="container" id="blog-posts-container">
            <div class="loading">جاري تحميل المقالات...</div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container">
            <div class="social-links">
                <a href="https://x.com/MoniCoinMECO" target="_blank">𝕏</a>
                <a href="https://t.me/monycoin1" target="_blank">✈️</a>
                <a href="https://github.com/MonyCoin" target="_blank">🐙</a>
                <a href="https://www.facebook.com/share/1ZUbCbssCU/" target="_blank">📘</a>
            </div>
            <p>© 2026 — MECO Project — مؤسسة MonyCoin للتطوير الرقمي</p>
            <p style="margin-top:4px;">المؤسس: محمد سعادة</p>
        </div>
    </footer>

    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            html.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
        }

        // ---- تحميل المقالات من مجلد _posts ----
        async function fetchPosts() {
            const container = document.getElementById('blog-posts-container');
            try {
                // جلب محتويات مجلد _posts من GitHub API
                const apiUrl = 'https://api.github.com/repos/MonyCoin/meco-web/contents/_posts';
                const response = await fetch(apiUrl);
                if (!response.ok) {
                    throw new Error('لا يمكن الوصول إلى المجلد');
                }
                const files = await response.json();

                // ترتيب الملفات من الأحدث للأقدم
                files.sort((a, b) => b.name.localeCompare(a.name));

                let html = '';
                for (const file of files) {
                    if (!file.name.endsWith('.md')) continue;
                    
                    const contentRes = await fetch(file.download_url);
                    const rawText = await contentRes.text();

                    // تحليل المحتوى
                    const { title_ar, title_en, date, tags, body } = parseMarkdown(rawText);

                    const postDate = new Date(date).toLocaleDateString('ar-SA', {
                        year: 'numeric', month: 'long', day: 'numeric'
                    });

                    const tagsHtml = (tags || ['أخبار']).map(tag => 
                        `<span class="blog-tag">${tag}</span>`
                    ).join('');

                    html += `
                        <article class="blog-card">
                            <p class="blog-date">📅 ${postDate}</p>
                            <h2><a href="#">${title_ar || title_en}</a></h2>
                            <p>${body.substring(0, 200)}...</p>
                            ${tagsHtml}
                        </article>
                    `;
                }

                if (html === '') {
                    html = '<div style="text-align:center;color:var(--text-secondary);padding:40px;">لا توجد مقالات منشورة بعد. انتظر التحديثات قريباً!</div>';
                }
                container.innerHTML = html;
            } catch (error) {
                console.error('Error:', error);
                container.innerHTML = '<div style="text-align:center;color:var(--text-secondary);padding:40px;">تعذر تحميل المقالات. تأكد من وجود مجلد _posts.</div>';
            }
        }

        function parseMarkdown(raw) {
            const meta = {};
            const lines = raw.split('\n');
            let inHeader = false;
            let bodyStart = 0;

            if (lines[0] && lines[0].trim() === '---') {
                inHeader = true;
                for (let i = 1; i < lines.length; i++) {
                    if (lines[i].trim() === '---') {
                        bodyStart = i + 1;
                        break;
                    }
                    const colonIndex = lines[i].indexOf(':');
                    if (colonIndex > -1) {
                        const key = lines[i].substring(0, colonIndex).trim();
                        let value = lines[i].substring(colonIndex + 1).trim();
                        if ((key === 'tags') && value.startsWith('[') && value.endsWith(']')) {
                            value = value.slice(1, -1).split(',').map(s => s.trim().replace(/"/g, ''));
                            meta[key] = value;
                        } else {
                            meta[key] = value.replace(/"/g, '').trim();
                        }
                    }
                }
            }

            const body = bodyStart > 0 ? lines.slice(bodyStart).join('\n') : raw;
            return { ...meta, body };
        }

        // تحميل المقالات عند فتح الصفحة
        document.addEventListener('DOMContentLoaded', fetchPosts);
    </script>
</body>
</html>
